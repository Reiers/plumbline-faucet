<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none" aria-hidden="true">
  <defs>
    <linearGradient id="dropGrad" x1="32" y1="6" x2="32" y2="58" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#7dd3fc"/>
      <stop offset="55%" stop-color="#38bdf8"/>
      <stop offset="100%" stop-color="#2563eb"/>
    </linearGradient>
    <linearGradient id="dropHighlight" x1="20" y1="10" x2="32" y2="40" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.65"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="ripple" cx="32" cy="58" r="20" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#38bdf8" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#38bdf8" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <!-- ripple -->
  <ellipse cx="32" cy="58" rx="20" ry="3.5" fill="url(#ripple)"/>
  <!-- main drop -->
  <path
    d="M32 5
       C 22 19, 12 30, 12 41
       C 12 51.5, 21 59, 32 59
       C 43 59, 52 51.5, 52 41
       C 52 30, 42 19, 32 5 Z"
    fill="url(#dropGrad)"/>
  <!-- inner highlight -->
  <path
    d="M27 16
       C 21 24, 17 33, 18 40
       C 19 33, 23 26, 28 20 Z"
    fill="url(#dropHighlight)"/>
  <!-- horizontal flow line (signature mark) -->
  <path
    d="M22 44 H 42"
    stroke="#ffffff" stroke-opacity="0.9" stroke-width="2.4" stroke-linecap="round"/>
</svg>
